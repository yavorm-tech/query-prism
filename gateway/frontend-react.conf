worker_processes auto;

events {
    worker_connections 1024;
}

http {
    proxy_buffering  off;
    proxy_cache      off;

    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;

    resolver 127.0.0.11 valid=10s ipv6=off;
    resolver_timeout 5s;

    # /topics collides: it is both an API path (GET list / {id} detail, always
    # sent with a Bearer header by the SPA) and a client route (/topics/:id page
    # navigation, no auth header). Disambiguate on the Authorization header.
    map $http_authorization $topics_is_api {
        ""      0;
        default 1;
    }

    server {
        listen 80;
        root /usr/share/nginx/html;

        # ── API → gateway ──
        location /auth/ {
            set $upstream http://gateway:8000;
            proxy_pass       $upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /ingest {
            set $upstream http://gateway:8000;
            proxy_pass            $upstream;
            proxy_set_header      Host $host;
            proxy_set_header      X-Real-IP $remote_addr;
            proxy_set_header      X-Forwarded-For $proxy_add_x_forwarded_for;
            client_max_body_size  600m;
        }

        location /chat/ {
            set $upstream http://gateway:8000;
            proxy_pass                 $upstream;
            proxy_set_header           Host $host;
            proxy_set_header           X-Real-IP $remote_addr;
            proxy_set_header           X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout         300s;
            proxy_buffering            off;
            proxy_cache                off;
            chunked_transfer_encoding  on;
        }

        location /topics {
            set $upstream http://gateway:8000;
            # No auth header → this is a page navigation; serve the SPA shell.
            if ($topics_is_api = 0) {
                rewrite ^ /index.html last;
            }
            proxy_pass       $upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /usage {
            set $upstream http://gateway:8000;
            proxy_pass       $upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /contact/ {
            set $upstream http://gateway:8000;
            proxy_pass       $upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /audit {
            set $upstream http://gateway:8000;
            proxy_pass       $upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /health {
            set $upstream http://gateway:8000;
            proxy_pass       $upstream;
            proxy_set_header Host $host;
        }

        # ── Static SPA + client-side routing fallback ──
        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}

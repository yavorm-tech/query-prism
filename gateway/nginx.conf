worker_processes auto;

events {
    worker_connections 1024;
}

http {
    server_tokens           off;
    proxy_hide_header       Server;
    add_header              Server "";

    proxy_buffering         off;
    proxy_cache             off;

    # Docker's internal DNS resolver — forces runtime DNS lookup so nginx
    # starts even if upstream containers aren't up yet.
    resolver 127.0.0.11 valid=10s ipv6=off;
    resolver_timeout 5s;

    server {
        listen 8000;

        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Content-Security-Policy "default-src 'none'" always;

        # ── Auth ──────────────────────────────────────────────────────────────
        location /auth/ {
            set $upstream http://auth:8001;
            proxy_pass         $upstream;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ── Ingest ────────────────────────────────────────────────────────────
        location /ingest {
            set $upstream http://ingestion:8002;
            proxy_pass         $upstream;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            client_max_body_size 600m;
        }

        # ── Chat (SSE streaming) ──────────────────────────────────────────────
        location /chat/ {
            set $upstream http://chat:8003;
            proxy_pass             $upstream;
            proxy_set_header       Host $host;
            proxy_set_header       X-Real-IP $remote_addr;
            proxy_set_header       X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout     300s;
            proxy_buffering        off;
            proxy_cache            off;
            chunked_transfer_encoding on;
        }

        # ── Topics ────────────────────────────────────────────────────────────
        location /topics {
            set $upstream http://chat:8003;
            proxy_pass         $upstream;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ── Usage ─────────────────────────────────────────────────────────────
        location /usage {
            set $upstream http://billing:8004;
            proxy_pass         $upstream;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ── Contact ───────────────────────────────────────────────────────────
        location /contact/ {
            set $upstream http://notification:8005;
            proxy_pass         $upstream;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ── Audit log ─────────────────────────────────────────────────────────
        location /audit {
            set $upstream http://auth:8001;
            proxy_pass         $upstream;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ── Health ────────────────────────────────────────────────────────────
        location /health {
            set $upstream http://auth:8001;
            proxy_pass         $upstream;
            proxy_set_header   Host $host;
        }
    }
}

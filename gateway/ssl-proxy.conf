worker_processes auto;

events {
    worker_connections 1024;
}

http {
    server_tokens    off;

    proxy_buffering  off;
    proxy_cache      off;

    resolver 127.0.0.11 valid=10s ipv6=off;
    resolver_timeout 5s;

    # Route /topics to the API gateway when a Bearer token is present,
    # otherwise to the React frontend (SPA page navigation).
    map $http_authorization $topics_upstream {
        ""      http://frontend:80;
        default http://gateway:8000;
    }

    # ── HTTP — ACME challenge + redirect to HTTPS ─────────────────────────────
    server {
        listen 80;
        server_name queryprism.online;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── HTTPS ─────────────────────────────────────────────────────────────────
    server {
        listen 443 ssl;
        server_name queryprism.online;

        ssl_certificate     /etc/letsencrypt/live/queryprism.online/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/queryprism.online/privkey.pem;

        ssl_protocols             TLSv1.2 TLSv1.3;
        ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
        ssl_prefer_server_ciphers off;
        ssl_session_cache         shared:SSL:10m;
        ssl_session_timeout       10m;

        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # ── Auth ──────────────────────────────────────────────────────────────
        location /auth/ {
            set $upstream http://gateway:8000;
            proxy_pass       $upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── Ingest ────────────────────────────────────────────────────────────
        location /ingest {
            set $upstream http://gateway:8000;
            proxy_pass            $upstream;
            proxy_set_header      Host $host;
            proxy_set_header      X-Real-IP $remote_addr;
            proxy_set_header      X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header      X-Forwarded-Proto $scheme;
            client_max_body_size  600m;
        }

        # ── Chat (SSE streaming) ──────────────────────────────────────────────
        location /chat/ {
            set $upstream http://gateway:8000;
            proxy_pass                 $upstream;
            proxy_set_header           Host $host;
            proxy_set_header           X-Real-IP $remote_addr;
            proxy_set_header           X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header           X-Forwarded-Proto $scheme;
            proxy_read_timeout         300s;
            proxy_buffering            off;
            proxy_cache                off;
            chunked_transfer_encoding  on;
        }

        # ── Topics ────────────────────────────────────────────────────────────
        # Requests with an Authorization header are API calls → gateway.
        # Requests without one are page navigation / Next.js RSC fetches → frontend.
        location /topics {
            set $upstream $topics_upstream;
            proxy_pass       $upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # ── Usage ─────────────────────────────────────────────────────────────
        location /usage {
            set $upstream http://gateway:8000;
            proxy_pass       $upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── Contact ───────────────────────────────────────────────────────────
        location /contact/ {
            set $upstream http://gateway:8000;
            proxy_pass       $upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── Audit log ─────────────────────────────────────────────────────────
        location /audit {
            set $upstream http://gateway:8000;
            proxy_pass       $upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── Health ────────────────────────────────────────────────────────────
        location /health {
            set $upstream http://gateway:8000;
            proxy_pass       $upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── React frontend (catch-all) ────────────────────────────────────────
        location / {
            set $upstream http://frontend:80;
            proxy_pass       $upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}

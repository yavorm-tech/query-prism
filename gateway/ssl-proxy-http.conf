worker_processes auto;

events {
    worker_connections 1024;
}

http {
    proxy_buffering  off;
    proxy_cache      off;

    resolver 127.0.0.11 valid=10s ipv6=off;
    resolver_timeout 5s;

    # Route /topics to the API gateway when a Bearer token is present,
    # otherwise to the React frontend (SPA page navigation).
    map $http_authorization $topics_upstream {
        ""      http://frontend:80;
        default http://gateway:8000;
    }

    server {
        listen 80;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location /auth/ {
            set $upstream http://gateway:8000;
            proxy_pass       $upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /ingest {
            set $upstream http://gateway:8000;
            proxy_pass            $upstream;
            proxy_set_header      Host $host;
            proxy_set_header      X-Real-IP $remote_addr;
            proxy_set_header      X-Forwarded-For $proxy_add_x_forwarded_for;
            client_max_body_size  600m;
        }

        location /chat/ {
            set $upstream http://gateway:8000;
            proxy_pass                 $upstream;
            proxy_set_header           Host $host;
            proxy_set_header           X-Real-IP $remote_addr;
            proxy_set_header           X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout         300s;
            proxy_buffering            off;
            proxy_cache                off;
            chunked_transfer_encoding  on;
        }

        location /topics {
            set $upstream $topics_upstream;
            proxy_pass       $upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /usage {
            set $upstream http://gateway:8000;
            proxy_pass       $upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /contact/ {
            set $upstream http://gateway:8000;
            proxy_pass       $upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /audit {
            set $upstream http://gateway:8000;
            proxy_pass       $upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /health {
            set $upstream http://gateway:8000;
            proxy_pass       $upstream;
            proxy_set_header Host $host;
        }

        location / {
            set $upstream http://frontend:80;
            proxy_pass       $upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}

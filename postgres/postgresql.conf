# Connections
listen_addresses = '*'
max_connections = 30

shared_buffers = 3GB               # 25% of host RAM allocated to container (8 GB)
effective_cache_size = 6GB
work_mem = 256MB                   # per sort/hash op — keep low with 30 connections
maintenance_work_mem = 1GB         # for VACUUM, index builds


hnsw.ef_search = 64                # recall vs speed trade-off (default 40)

#WAL-Checkpoints
wal_buffers = 64MB
checkpoint_completion_target = 0.9
min_wal_size = 256MB
max_wal_size = 2GB

# Parallel workers 
max_worker_processes = 8
max_parallel_workers = 4
max_parallel_workers_per_gather = 2
max_parallel_maintenance_workers = 4   # speeds up HNSW index build

# Logging (dev-friendly)
log_min_duration_statement = 500   # log queries slower than 500ms
log_line_prefix = '%t [%p] %u@%d '
log_timezone = 'UTC'

#Locale 
timezone = 'UTC'
